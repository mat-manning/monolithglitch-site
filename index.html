<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monolith Glitch</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        a { color: #a78bfa; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .hero {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 20px 48px;
        }
        .hero img {
            max-width: 360px;
            width: 100%;
            height: auto;
        }
        .app-card {
            max-width: 480px;
            width: 100%;
            background: #111;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 32px;
            text-align: center;
            margin: 0 20px 40px;
        }
        .app-card .icon {
            width: 80px;
            height: 80px;
            border-radius: 18px;
            overflow: hidden;
            margin: 0 auto 16px;
        }
        .app-card .icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .app-card h2 {
            font-size: 1.3rem;
            color: #fff;
            margin-bottom: 4px;
        }
        .app-card .subtitle {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 16px;
        }
        .app-card .description {
            color: #aaa;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 20px;
        }
        .app-store-badge {
            display: inline-block;
            background: #fff;
            color: #000;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 10px 24px;
            border-radius: 8px;
            transition: opacity 0.2s;
        }
        .app-store-badge:hover {
            opacity: 0.85;
            text-decoration: none;
        }
        footer {
            margin-top: auto;
            text-align: center;
            padding: 32px 20px;
            color: #555;
            font-size: 0.8rem;
        }
        footer a { color: #777; }
        footer .links { margin-bottom: 8px; }
        footer .links a { margin: 0 8px; }
    </style>
</head>
<body>
    <div class="hero">
        <img src="/monolith-glitch-logo.svg" alt="Monolith Glitch">
    </div>

    <div class="app-card">
        <div class="icon">
            <img src="/giforia-logo.svg" alt="Giforia">
        </div>
        <h2>Giforia</h2>
        <div class="subtitle">GIF Reaction Maker</div>
        <div class="description">
            Turn photos and videos into the perfect reaction GIF.
            Custom emoji for Slack, Discord, Teams &amp; Twitch.
        </div>
        <a href="https://apps.apple.com/app/id6744406410" class="app-store-badge">
            Download on the App Store
        </a>
    </div>

    <footer>
        <div class="links">
            <a href="/giforia-privacy-policy">Privacy Policy</a>
            <a href="/contact">Contact</a>
        </div>
        <p>&copy; 2025 Monolith Glitch. All rights reserved.</p>
    </footer>
</body>
</html>
